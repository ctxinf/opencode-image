# Build the opencode image and push to GHCR (ghcr.io/<owner>/opencode-image).
# Tag pushes (vX.Y.Z) build opencode version X.Y.Z and tag the image with it.
name: docker-image

on:
  push:
    # NOTE: no `paths` filter — combining `paths` with `tags` silently skips tag builds
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag push vX.Y.Z -> build opencode X.Y.Z; otherwise Dockerfile default
      - name: Resolve opencode version
        id: ver
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            echo "build_args=OPENCODE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "note=opencode ${GITHUB_REF_NAME#v} (tag build)" >> "$GITHUB_OUTPUT"
          else
            DEFAULT=$(sed -n 's/^ARG OPENCODE_VERSION=//p' docker/Dockerfile)
            echo "build_args=" >> "$GITHUB_OUTPUT"
            echo "note=opencode ${DEFAULT} (branch build, commit ${GITHUB_SHA::7})" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/opencode-image
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
          labels: |
            org.opencontainers.image.description=Unofficial community Docker image of opencode web — ${{ steps.ver.outputs.note }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker
          push: true
          build-args: ${{ steps.ver.outputs.build_args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
