# docker compose up -d  ->  http://localhost:7777
services:
  opencode:
    # Published image. To build locally instead: docker compose up -d --build
    image: ghcr.io/ctxinf/opencode-image:latest 
    container_name: opencode
    ports:
      - "7777:7777"
    environment:
      # Without a password opencode logs "server is unsecured" and the web UI
      # is open to anyone who can reach the port. Set it for any real deployment:
      #   OPENCODE_SERVER_PASSWORD=secret docker compose up -d
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-}
      # Initial workspace dir; created and git-inited on start if missing
      - OPENCODE_WORKDIR=${OPENCODE_WORKDIR:-/workspace}
    volumes:
      - opencode-config:/root/.config/opencode
      - opencode-data:/root/.local/share/opencode
      - workspace:/workspace
    # Debugging: switch to command: ["sleep", "infinity"], then docker exec -it opencode sh
    restart: unless-stopped

# Named volumes: seeded from the image on first creation (including the
# baked-in opencode.jsonc), survive container restarts and re-creation.
volumes:
  opencode-config:
  opencode-data:
  workspace:
